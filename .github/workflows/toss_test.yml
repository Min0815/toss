name: Toss API 연결 테스트

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 현재 실행 IP 확인
        run: |
          echo "=============================="
          echo " GitHub Actions 현재 IP 주소"
          echo "=============================="
          curl -s https://api.ipify.org
          echo ""
          echo "=============================="
          echo " 위 IP를 토스증권 WTS에 등록하세요"
          echo " 설정 → Open API → 허용 IP 관리 → IP 추가"
          echo "=============================="

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 토스 API 연결 테스트
        env:
          TOSS_APP_KEY: ${{ secrets.TOSS_APP_KEY }}
          TOSS_APP_SECRET: ${{ secrets.TOSS_APP_SECRET }}
        run: python scripts/test_connection.py
