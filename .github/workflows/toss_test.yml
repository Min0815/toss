name: Toss API 연결 테스트

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 토스 API 연결 테스트
        env:
          TOSS_APP_KEY: ${{ secrets.TOSS_APP_KEY }}
          TOSS_APP_SECRET: ${{ secrets.TOSS_APP_SECRET }}
        run: |
          python scripts/test_connection.py
